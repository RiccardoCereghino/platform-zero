apiVersion: apps/v1
kind: Deployment
metadata:
  name: coraza-waf
  namespace: security
  labels:
    app: coraza-waf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coraza-waf
  template:
    metadata:
      labels:
        app: coraza-waf
      annotations:
        checksum/config: "{{ include (print $.Template.BasePath \"/configmap.yaml\") . | sha256sum }}"
    spec:
      containers:
        - name: coraza-caddy
          image: ghcr.io/coreruleset/coraza-crs:caddy-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /config/caddy/Caddyfile
              subPath: Caddyfile
            - name: tmp-dir
              mountPath: /tmp/coraza
      volumes:
        - name: config
          configMap:
            name: coraza-waf-config
        - name: tmp-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coraza-waf
  namespace: security
spec:
  selector:
    app: coraza-waf
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: waf-gateway-grant
  namespace: security
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: vault
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: monitoring
  to:
    - group: ""
      kind: Service
      name: coraza-waf
