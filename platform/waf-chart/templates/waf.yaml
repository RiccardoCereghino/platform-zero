apiVersion: v1
kind: ConfigMap
metadata:
  name: coraza-waf-config
  namespace: security
data:
  Caddyfile: |
    {
      order coraza_waf first
    }

    (waf) {
      coraza_waf {
        directives `
          Include /opt/coraza/config/coraza.conf
          Include /opt/coraza/config/crs-setup.conf

          # 1. FIX: Explicitly remove Method Enforcement (911100) for Vaultwarden
          # Correct operator is @beginsWith
          SecRule REQUEST_FILENAME "@beginsWith /api/" \
              "id:1001,phase:1,pass,nolog,ctl:ruleRemoveById=911100"

          # 2. FIX: Disable SQLi checks for Vaultwarden API
          SecRule REQUEST_FILENAME "@beginsWith /api/" \
              "id:1002,phase:1,pass,nolog,ctl:ruleRemoveById=942100"

          # 3. FIX: Disable SQLi for Grafana/Prometheus queries
          SecRule REQUEST_FILENAME "@contains /api/ds/query" \
              "id:1003,phase:1,pass,nolog,ctl:ruleRemoveById=942100"

          Include /opt/coraza/owasp-crs/rules/*.conf
          SecRuleEngine On
          SecTmpDir /tmp/coraza
        `
      }
    }
    
    vault.cereghino.me:80 {
      import waf
      reverse_proxy vaultwarden.vault.svc.cluster.local:80 {
        header_up X-Real-IP {remote_host}
      }
    }
    
    grafana.cereghino.me:80 {
      import waf
      reverse_proxy kube-prometheus-stack-grafana.monitoring.svc.cluster.local:80
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coraza-waf
  namespace: security
  labels:
    app: coraza-waf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coraza-waf
  template:
    metadata:
      labels:
        app: coraza-waf
    spec:
      containers:
        - name: coraza-caddy
          image: ghcr.io/coreruleset/coraza-crs:caddy-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /config/caddy/Caddyfile
              subPath: Caddyfile
            - name: tmp-dir
              mountPath: /tmp/coraza
      volumes:
        - name: config
          configMap:
            name: coraza-waf-config
        - name: tmp-dir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: coraza-waf
  namespace: security
spec:
  selector:
    app: coraza-waf
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: waf-gateway-grant
  namespace: security
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: vault
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: monitoring
  to:
    - group: ""
      kind: Service
      name: coraza-waf