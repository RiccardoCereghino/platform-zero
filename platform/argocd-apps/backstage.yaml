---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: "*"
    helm:
      valuesObject:
        backstage:
          image:
            registry: ghcr.io
            repository: backstage/backstage
            tag: latest
          appConfig:
            app:
              baseUrl: https://backstage.cereghino.me
            backend:
              baseUrl: https://backstage.cereghino.me
              listen:
                port: 7007
              database:
                client: better-sqlite3
                connection: ":memory:"
        postgresql:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
