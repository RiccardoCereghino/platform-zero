---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dex
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://charts.dexidp.io
    chart: dex
    targetRevision: "*"
    helm:
      valuesObject:
        envFrom:
          - secretRef:
              name: dex-secrets
        config:
          issuer: https://dex.cereghino.me
          storage:
            type: kubernetes
            config:
              inCluster: true
          connectors:
            - type: github
              id: github
              name: GitHub
              config:
                clientID: $GITHUB_CLIENT_ID
                clientSecret: $GITHUB_CLIENT_SECRET
                redirectURI: https://dex.cereghino.me/callback
          staticClients:
            - id: oauth2-proxy
              name: OAuth2 Proxy
              secret: "07844409ba0aaf2b007a161d6394456541df8be98d18e97d2792be645d6d3303"
              redirectURIs:
                - https://hubble.cereghino.me/oauth2/callback
            - id: kubernetes-cli
              name: "Kubernetes CLI"
              secret: k8s-cli-secret-99
              redirectURIs:
                - http://localhost:8000
                - http://localhost:18000
            - id: argocd
              name: ArgoCD
              secret: "ccfd06505df7b12d90bf475aa5836cac81ad22b4b5dd979c6d4fc5ddfa12a9f8"
              redirectURIs:
                - https://argocd.cereghino.me/auth/callback
          oauth2:
            skipApprovalScreen: true
  destination:
    server: https://kubernetes.default.svc
    namespace: auth
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
