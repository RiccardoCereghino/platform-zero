---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generators:
  - ksops-generator.yaml

resources:
  - monitoring-namespace.yaml
  - velero-namespace.yaml
  # - longhorn-namespace.yaml  # Disabled — see ADR-031
  - argocd-route.yaml
  - dex-route.yaml
  - hubble-route.yaml
  - vault-route.yaml
  - grafana-route.yaml
  - redirect-route.yaml
  - rbac-admin.yaml
  - vault-db.yaml
  - grafana-reference-grant.yaml
  - oauth2-proxy-allowed-emails.yaml
  # - backstage-namespace.yaml  # Disabled — see ADR-031
  # - backstage-route.yaml  # Disabled — see ADR-031
  # ArgoCD Application manifests (auto-managed by platform-manifests)
  # NOTE: platform-manifests.yaml is excluded to avoid circular self-management
  # - argocd-apps/backstage.yaml  # Disabled — see ADR-031
  - argocd-apps/cert-manager.yaml
  # - argocd-apps/crossplane.yaml  # Disabled — see ADR-031
  # - argocd-apps/crossplane-providers.yaml  # Disabled — see ADR-031
  - argocd-apps/dex.yaml
  - argocd-apps/external-dns.yaml
  - argocd-apps/kube-prometheus-stack.yaml
  # - argocd-apps/longhorn.yaml  # Disabled — see ADR-031
  - argocd-apps/oauth2-proxy.yaml
  - argocd-apps/vaultwarden.yaml
  - argocd-apps/velero.yaml
  - argocd-apps/waf.yaml
