name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  infrastructure-ci:
    name: Infrastructure CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    env:
      HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION || 'eu-central-1' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Tofu Format
        id: fmt
        run: tofu fmt -check
        continue-on-error: true

      - name: Tofu Init
        id: init
        run: tofu init

      - name: Tofu Validate
        id: validate
        run: tofu validate

      - name: Tofu Plan
        id: plan
        run: |
          tofu plan -no-color -out=tfplan > plan.txt
          plan_content=$(cat plan.txt)
          echo "plan<<EOF" >> $GITHUB_OUTPUT
          echo "$plan_content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        env:
          PLAN: ${{ steps.plan.outputs.plan }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### OpenTofu Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### OpenTofu Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### OpenTofu Validation 🤖\`${{ steps.validate.outcome }}\`
            #### OpenTofu Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Tofu Plan Status
        if: steps.plan.outcome == 'failure' || steps.fmt.outcome == 'failure'
        run: exit 1

  platform-ci:
    name: Platform CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Helmfile
        uses: mamezou-tech/setup-helmfile@v2

      - name: Install yamllint and kubeconform
        run: |
          sudo apt-get update && sudo apt-get install -y yamllint wget tar
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.6/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Yamllint
        run: yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable}}" .

      - name: Helmfile Lint
        run: helmfile lint

      - name: Helmfile Template & Kubeconform
        run: |
          helmfile template > manifests.yaml
          kubeconform -strict -summary -ignore-missing-schemas manifests.yaml
