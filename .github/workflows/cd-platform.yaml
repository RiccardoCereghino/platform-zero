name: Platform CD

on:
  push:
    branches:
      - master
    paths:
      - 'platform/**'

permissions:
  contents: read

jobs:
  platform-cd:
    name: Platform CD
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: platform
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SOPS
        run: |
          wget -qO /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.12.1/sops-v3.12.1.linux.amd64
          chmod +x /usr/local/bin/sops

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup Helmfile
        uses: mamezou-tech/setup-helmfile@v2.2.0

      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > /tmp/kubeconfig
        env:
          KUBECONFIG: /tmp/kubeconfig

      - name: Decrypt and apply secrets
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          for f in *-secrets.yaml; do
            sops --decrypt "$f" | kubectl apply -f -
          done

      - name: Helmfile Apply
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: helmfile apply
